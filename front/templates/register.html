{% extends 'base.html' %}
{% block content %}
<h2>Register</h2>
<form method="post">
    <label>User ID:<input type="text" name="user_id"></label><br>
    <label>Senha:<input type="password" name="senha"></label><br>
    <label>Nome:<input type="text" name="nome"></label><br>
    <label>Idade:<input type="text" name="idade"></label><br>
    <label>Nível de conhecimento:<input type="text" name="nivel"></label><br>
    <label>Estilo de aprendizagem:<input type="text" name="estilo"></label><br>
    <button type="submit">Registrar</button>
</form>
{% endblock %}
