<!doctype html>
<html lang="pt-br">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>V-Lab</title>
    <style>
        :root {
            --bg: #f5f6fa;
            --surface: #ffffff;
            --primary: #4f46e5;
            --primary-light: #ede9fe;
            --secondary: #0ea5e9;
            --green: #10b981;
            --green-light: #d1fae5;
            --amber: #f59e0b;
            --amber-light: #fef3c7;
            --red: #ef4444;
            --red-light: #fee2e2;
            --text: #1e1b4b;
            --muted: #6b7280;
            --border: #e5e7eb;
            --radius: 12px;
            --shadow: 0 1px 3px rgba(0,0,0,.08), 0 4px 16px rgba(0,0,0,.06);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
        }

        /* ── Nav ── */
        nav {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 0 1.5rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            height: 56px;
            position: sticky;
            top: 0;
            z-index: 10;
            box-shadow: 0 1px 4px rgba(0,0,0,.06);
        }

        .nav-brand {
            font-weight: 700;
            font-size: 1.15rem;
            color: var(--primary);
            letter-spacing: -.5px;
            text-decoration: none;
            margin-right: auto;
        }

        nav a {
            color: var(--muted);
            text-decoration: none;
            font-size: .9rem;
            font-weight: 500;
            padding: .35rem .75rem;
            border-radius: 8px;
            transition: background .15s, color .15s;
        }

        nav a:hover { background: var(--bg); color: var(--primary); }

        /* ── Layout ── */
        .container {
            max-width: 860px;
            margin: 0 auto;
            padding: 2rem 1.25rem;
        }

        /* ── Flash messages ── */
        .flashes {
            list-style: none;
            margin-bottom: 1.25rem;
        }

        .flashes li {
            background: var(--amber-light);
            border-left: 4px solid var(--amber);
            padding: .75rem 1rem;
            border-radius: 8px;
            margin-bottom: .5rem;
            font-size: .9rem;
        }

        /* ── Cards ── */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.5rem;
            box-shadow: var(--shadow);
        }

        /* ── Forms ── */
        label { font-size: .9rem; font-weight: 600; color: var(--muted); display: block; margin-bottom: .4rem; }

        input[type="text"],
        input[type="password"],
        select {
            width: 100%;
            padding: .6rem .9rem;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: .95rem;
            background: var(--bg);
            color: var(--text);
            outline: none;
            transition: border .15s, box-shadow .15s;
            margin-bottom: 1rem;
        }

        input:focus, select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-light);
        }

        button, .btn {
            display: inline-flex;
            align-items: center;
            gap: .4rem;
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: .65rem 1.4rem;
            font-size: .95rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity .15s, transform .1s;
            text-decoration: none;
        }

        button:hover, .btn:hover { opacity: .9; transform: translateY(-1px); }
        button:active { transform: translateY(0); }

        /* ── Headings ── */
        h1 { font-size: 1.75rem; font-weight: 700; }
        h2 { font-size: 1.35rem; font-weight: 700; margin-bottom: .5rem; }
        h3 { font-size: 1.05rem; font-weight: 700; margin-bottom: .3rem; }
    </style>
</head>

<body>
    <nav>
        <a class="nav-brand" href="/">V-Lab</a>
        {% if session.user_id %}
        <a href="{{ url_for('dashboard') }}">Dashboard</a>
        <a href="{{ url_for('logout') }}">Sair</a>
        {% else %}
        <a href="{{ url_for('login') }}">Login</a>
        <a href="{{ url_for('register') }}">Registrar</a>
        {% endif %}
    </nav>

    <div class="container">
        {% with messages = get_flashed_messages() %}
        {% if messages %}
        <ul class="flashes">
            {% for msg in messages %}
            <li>{{ msg }}</li>
            {% endfor %}
        </ul>
        {% endif %}
        {% endwith %}

        {% block content %}{% endblock %}
    </div>
</body>

</html>
